<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
            display: flex;
            justify-content: center;
        }

        #formContainer {
            display: flex;
            flex-direction: column;
            width: 500px;
            height: 800px;
            border: 10px solid blue;
            border-radius: 30px;
            background-color: white;
            /* justify-content: space-between; */
            overflow: hidden;
        }

        #top {
            background-image: url("images/jesus_feeds_5000.jpeg");
            height: 28%;
            background-size: cover;
            object-fit: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #top h1, h2 {
            color: white;
            text-shadow: 2px 2px 2px black;
        }

        #scriptures {
            display: flex;
            justify-content: space-between;
            height: 125px;
            margin-top: 70px;
        }

        h3 {
            margin: 30px 0;
            align-self: center;
            font-weight: bold;
        }

        form #grid-wrapper {
            margin: 0 20px;
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }

        form #grid-wrapper label {
            grid-column: 1/2;
        }

        form #grid-wrapper input {
            grid-column: 3/5;
        }

        form #closeBtn {
            width: 20px;
            height: 20px;
            display: block;
            position: absolute;
            top: 40px;
            margin: 5px 10px;
            padding: 0;
        }

        form section {
            margin-top: 30px;
            display: flex;
            justify-self: center;
            gap: 5px;
        }

        form #flex-wrapper {
            margin-top: 40px;
        }

        form #gender {
            grid-column: 3/5;
        }
        

    </style>



</head>

<body>
    <div id="formContainer">
        <div id="top">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <div id="grid-wrapper">
                <button type="button" id="closeBtn">X</button>
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div id="gender">
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div> 
            </div>

            <div id="flex-wrapper">
                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section>
                    <button type="submit">Submit</button>
                </section>
            </div>

        </form>

        <div id="scriptures">
            <img src="images/old_testament.webp" alt="old_testament">
            <img src="images/new_testament.webp" alt="new_testament">
            <img src="images/book_of_mormon.webp" alt="book_of_mormon">
            <img src="images/doctrine_and_covenants.webp" alt="doctrine_and_covenants">
            <img src="images/pearl_of_great_price.webp" alt="pearl_of_great_price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
