<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cssforindex.css" />
    <title>Trevor Beckstrand About Me</title>

    <style>
        :root {
            --primary:    #2F2F2F;  
            --accent:     #4A5C4F;
            --secondary:  #8C7A6B; 
            --light:      #F8F6F3;   
            --neutral:    #6B6B6B;   
            --highlight:  #A8B5A2;    
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--primary);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        header img {
            height: 60px;
            width: auto;
        }

        nav a {
            color: var(--light);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
        }

        nav a:hover {
            color: var(--highlight);
        }

        main {
            margin-top: 100px;
            padding: 2rem 5%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Hero Section - Profile + About */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            margin-bottom: 5rem;
        }

        #card-pic {
            background-color: var(--accent);
            border-radius: 40px;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.15);
        }

        #card-pic img {
            width: 100%;
            max-width: 380px;
            height: auto;
            border-radius: 30px;
            display: block;
        }

        #about-me {
            background-color: var(--primary);
            color: var(--light);
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.15);
        }

        #about-me h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--highlight);
        }

        /* Contact Form */
        #form-section-two {
            background-color: white;
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            margin: 0 auto;
        }

        #form-section-two h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
            font-size: 2rem;
        }

        form {
            display: grid;
            gap: 1.25rem;
        }

        label {
            font-weight: 600;
            color: var(--neutral);
        }

        input, textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        input[type="submit"] {
            background-color: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            padding: 1rem 2rem;
            border: none;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: var(--highlight);
        }

        footer {
            background-color: var(--primary);
            color: var(--light);
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }

        #icons {
            margin-top: 1rem;
        }

        #icons img {
            height: 40px;
            margin: 0 1rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero {
                grid-template-columns: 1fr;
                gap: 3rem;
                text-align: center;
            }
            
            #card-pic {
                max-width: 380px;
                margin: 0 auto;
            }
        }
    </style>
</head>

<body>
    <header>
        <img src="images/logo_four.jpg" alt="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="../white-water-rafting/index.html" target="_blank">WWR</a>
            <a href="ice.html">ICE</a>
            <a href="aboutme.html">About Me</a>
        </nav>
    </header>

    <main>
        <!-- Hero: Photo + About -->
        <div class="hero">
            <section id="card-pic">
                <img src="images/profile_pic.jpeg" alt="Trevor Beckstrand">
            </section>
            
            <section id="about-me">
                <!-- Add your about text here -->
                <h1>About Me</h1>
                <p>I'm Trevor Beckstrand, a passionate web developer and outdoor enthusiast. Welcome to my personal site.</p>
                <!-- Add more paragraphs as needed -->
            </section>
        </div>

        <!-- Contact Form -->
        <section id="form-section-two">
            <h2>Contact Me</h2>
            <form>
                <label for="your_name">Your Name:</label>
                <input id="your_name" type="text" required>

                <label for="email">Email:</label>
                <input id="email" type="email" required>

                <label for="message">Message:</label>
                <textarea id="message" required></textarea>

                <input type="submit" value="Send Message">
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Trevor Beckstrand | WDD 130 | BYU-Idaho</p>
        <div id="icons">
            <a href="https://facebook.com" target="_blank">
                <img id="fb-icon" src="../white-water-rafting/images/facebook.png" alt="fb icon">
            </a>
            <a href="index.html">
                <img id="footer-logo" src="images/logo_four.jpg" alt="logo">
            </a>
        </div>
    </footer>
</body>
</html>
